name: Navegador Chrome Pro (Modo Chile)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar Entorno de Alto Rendimiento con Audio Nativo
        run: |
          # 1. Levantamos el contenedor con entorno gráfico y soporte de audio nativo por web
          docker run -d -p 6080:6901 --shm-size=2gb --security-opt seccomp=unconfined -e VNC_PW=password kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "CONFIGURANDO EXTENSIONES Y REGLAS EN CHROME..."
          echo "=========================================================="
          
          sleep 12

          # 2. Inyectamos las extensiones (Urban VPN y User-Agent) mediante las políticas administradas
          docker exec -u root $(docker ps -q) sh -c "
            mkdir -p /etc/opt/chrome/policies/managed &&
            echo '{\"ExtensionInstallForcelist\": [\"eppiocemhmnbneldhgflamieenbbgcko;https://clients2.google.com/service/update2/crx\", \"djflhoibgkdhocackgohgcaadenmccno;https://clients2.google.com/service/update2/crx\"]}' > /etc/opt/chrome/policies/managed/extensions.json
          "

          echo "=========================================================="
          echo "SISTEMA LISTO. ACTIVANDO ENLACE CLOUDFLARE..."
          echo "=========================================================="

          # 3. Descarga Cloudflare
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

          # 4. Genera el enlace público forzando el protocolo HTTPS y desactivando la verificación estricta de TLS
          ./cloudflared tunnel --no-tls-verify --url https://localhost:6080
