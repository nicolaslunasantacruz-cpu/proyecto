name: Navegador Chrome Pro (Modo Chile)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Entorno Linux Profesional de Alta Compatibilidad
        run: |
          echo "=========================================================="
          echo "LEVANTANDO CONTENEDOR KASM CHROME PROFESIONAL..."
          echo "=========================================================="
          docker run -d -p 6080:6901 --shm-size=2gb --security-opt seccomp=unconfined -e VNC_PW=password kasmweb/chrome:1.16.0

          echo "=========================================================="
          echo "CONFIGURANDO POLÍTICAS ANTI-CAPTCHA Y EXTENSIONES..."
          echo "=========================================================="
          sleep 8

          docker exec -u root $(docker ps -q) sh -c "
            mkdir -p /etc/opt/chrome/policies/managed &&
            echo '{\
              \"ExtensionInstallForcelist\": [\
                \"eppiocemhmnbneldhgflamieenbbgcko;https://clients2.google.com/service/update2/crx\",\
                \"djflhoibgkdhocackgohgcaadenmccno;https://clients2.google.com/service/update2/crx\"\
              ],\
              \"CommandLineFlagSecurityWarningsEnabled\": false\
            }' > /etc/opt/chrome/policies/managed/extensions.json
          "

          echo "=========================================================="
          echo "SISTEMA LISTO. OBTENIENDO IP PÚBLICA DE RESPALDO..."
          echo "=========================================================="
          # Guardamos la IP pública del servidor de GitHub, la vas a necesitar para validar LocalTunnel
          echo "TU IP DE VERIFICACIÓN ES:"
          curl -s ifconfig.me
          echo ""
          echo "=========================================================="
          echo "ACTIVANDO ENLACE REMOTO CON LOCALTUNNEL..."
          echo "=========================================================="
          # Instalamos y corremos localtunnel apuntando al puerto 6080
          sudo npm install -g localtunnel
          lt --port 6080
