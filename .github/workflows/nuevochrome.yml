name: Nuevo Chrome

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Entorno Linux Profesional de Alta Compatibilidad
        run: |
          echo "=========================================================="
          echo "LEVANTANDO CONTENEDOR KASM CHROME PROFESIONAL..."
          echo "=========================================================="
          # Levantamos el contenedor oficial de Kasm Chrome optimizado para navegación remota
          docker run -d -p 6080:6901 --shm-size=2gb --security-opt seccomp=unconfined -e VNC_PW=password kasmweb/chrome:1.16.0

          echo "=========================================================="
          echo "CONFIGURANDO POLÍTICAS ANTI-CAPTCHA Y EXTENSIONES..."
          echo "=========================================================="
          sleep 8

          # Forzamos la instalación de las extensiones (Urban VPN y User-Agent) de forma limpia
          docker exec -u root $(docker ps -q) sh -c "
            mkdir -p /etc/opt/chrome/policies/managed &&
            echo '{\
              \"ExtensionInstallForcelist\": [\
                \"eppiocemhmnbneldhgflamieenbbgcko;https://clients2.google.com/service/update2/crx\",\
                \"djflhoibgkdhocackgohgcaadenmccno;https://clients2.google.com/service/update2/crx\"\
              ],\
              \"CommandLineFlagSecurityWarningsEnabled\": false\
            }' > /etc/opt/chrome/policies/managed/extensions.json
          "

          echo "=========================================================="
          echo "INSTALANDO Y ACTIVANDO TÚNEL SEGURO CON NGROK..."
          echo "=========================================================="
          # 1. Instalamos el agente oficial de Ngrok compatible con Ubuntu Latest
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y

          # 2. Iniciamos el túnel apuntando al HTTPS de Kasm sin la bandera obsoleta (--schemes)
          ngrok http https://localhost:6080 &
          
          # 3. Esperamos a que Ngrok asigne la URL y la extraemos para mostrártela en pantalla
          sleep 5
          echo ""
          echo "=========================================================="
          echo "TU NUEVO ENLACE DE ACCESO REMOTO ES:"
          curl -s http://127.0.0.1:4040/api/tunnels | grep -o '"public_url":"[^"]*' | grep -o 'https://.*'
          echo "=========================================================="
          echo ""
          
          # Mantenemos vivo el flujo de GitHub Actions para que puedas trabajar sin que se cierre
          sleep 21600
