name: Nuevo Chrome con Audio

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual Clásico con Audio Nativo
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO UBUNTU CON AUDIO..."
          echo "=========================================================="
          # Levantamos el contenedor definitivo con Chrome y Audio Web integrado (Puertos 6080 y 6901)
          docker run -d -p 8080:6901 --shm-size=2gb --name=desktop -e VNC_PW=password accetto/ubuntu-vnc-xfce-g3-chromium

          echo "=========================================================="
          echo "ESPERANDO QUE EL SISTEMA INICIE..."
          echo "=========================================================="
          sleep 12

          echo "=========================================================="
          echo "ACTIVANDO TÚNEL AUTOMÁTICO DE CLOUDFLARE..."
          echo "=========================================================="
          # Descargamos la herramienta oficial de Cloudflare
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          # Lanzamos el túnel directo al puerto del escritorio clásico (8080)
          cloudflared tunnel --url http://localhost:8080 --no-tls-verify &

          sleep 10
          echo "=========================================================="
          echo "BUSCA TU ENLACE DE TRYCLOUDFLARE ABAJO:"
          echo "=========================================================="
          
          # Mantenemos vivo el flujo de GitHub Actions
          sleep 21600
