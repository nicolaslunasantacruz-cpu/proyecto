name: Nuevo Chrome con Audio

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual con Chrome y Audio
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO UBUNTU VISUAL DEFINITIVO..."
          echo "=========================================================="
          # Esta imagen corre en HTTP plano, tiene Chrome real y noVNC directo en el puerto 6901
          docker run -d -p 8080:6901 --shm-size=2gb --name=desktop -e VNC_PW=password consol/ubuntu-xfce-vnc

          echo "=========================================================="
          echo "ESPERANDO QUE EL SISTEMA INICIE..."
          echo "=========================================================="
          sleep 12

          echo "=========================================================="
          echo "ACTIVANDO TÚNEL AUTOMÁTICO DE CLOUDFLARE..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          # Volvemos a apuntar al puerto 8080 porque el contenedor expone la interfaz directo ahí
          cloudflared tunnel --url http://localhost:8080 --no-tls-verify &

          sleep 10
          echo "=========================================================="
          echo "BUSCA TU ENLACE DE TRYCLOUDFLARE ABAJO:"
          echo "=========================================================="
          
          sleep 21600
