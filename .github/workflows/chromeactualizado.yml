name: Ubuntu Clasico noVNC con Audio Real y VPN

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Ubuntu noVNC Ligero con Audio
        run: |
          echo "=========================================================="
          echo "1. LEVANTANDO ENTORNO NOVNC CON AUDIO..."
          echo "=========================================================="
          # Usamos una imagen con PulseAudio y noVNC web listo en el puerto 80
          docker run -d \
            -p 8080:80 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PASSWORD=password \
            -e SSL_PORT=none \
            fradelg/ubuntu-fluxbox-novnc:latest

          echo "=========================================================="
          echo "2. INSTALANDO CLOUDFLARE EN EL RUNNER..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "3. INICIANDO TÚNEL HTTP HACIA EL ESCRITORIO..."
          echo "=========================================================="
          cloudflared tunnel --url http://localhost:8080 > cloudflare.log 2>&1 &

          echo "=========================================================="
          echo "4. ESPERANDO ARRANQUE DEL SISTEMA (25 SEGUNDOS)..."
          echo "=========================================================="
          sleep 25

          echo "=========================================================="
          echo "5. INSTALANDO GOOGLE CHROME, VPN Y PARCHES DE AUDIO..."
          echo "=========================================================="
          # Instalamos Chrome y la política para Urban VPN
          docker exec -u 0 desktop bash -c "
            apt-get update && \
            apt-get install -y wget pulseaudio pavucontrol alsa-utils && \
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && \
            dpkg -i google-chrome-stable_current_amd64.deb || apt-get install -y -f && \
            mkdir -p /etc/opt/chrome/policies/managed && \
            echo '{ \"ExtensionInstallForcelist\": [ \"pbiocdedecmfgjhjigcoijhmneicffof;https://clients2.google.com/service/update2/crx\" ] }' > /etc/opt/chrome/policies/managed/vpn.json && \
            pactl set-sink-mute @DEFAULT_SINK@ false 2>/dev/null || true && \
            pactl set-sink-volume @DEFAULT_SINK@ 100% 2>/dev/null || true
          "

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno
          sleep 21000
