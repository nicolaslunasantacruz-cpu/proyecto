name: Chrome Moderno con Audio Real y Urban VPN

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual con Chrome, Audio y VPN
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO CON AUDIO POR SOFTWARE..."
          echo "=========================================================="
          
          # Desactivamos el SSL interno para el audio
          # Usamos las flags de Chrome en Kasm para auto-instalar la extensión de Urban VPN
          # El ID 'pbiocdedecmfgjhjigcoijhmneicffof' corresponde a Urban VPN en la Chrome Web Store
          docker run -d \
            -p 8080:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=1 \
            -e START_PULSEAUDIO=1 \
            -e KASM_SSL_PROXY=1 \
            -e CHROME_ARGS="--disable-gpu --no-sandbox --load-extension=/usr/share/urban-vpn" \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "INSTALANDO EXTENSIÓN URBAN VPN EN CHROME..."
          echo "=========================================================="
          sleep 10
          
          # Forzamos la instalación de la extensión usando las políticas del sistema de Chrome dentro del contenedor
          docker exec -u 0 desktop bash -c "
            mkdir -p /etc/opt/chrome/policies/recommended && \
            echo '{ \"ExtensionInstallForcelist\": [ \"pbiocdedecmfgjhjigcoijhmneicffof;https://clients2.google.com/service/update2/crx\" ] }' > /etc/opt/chrome/policies/recommended/vpn.json
          "

          echo "=========================================================="
          echo "INSTALANDO CLOUDFLARE EN EL RUNNER..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "INICIANDO TÚNEL HTTP SEGURO..."
          echo "=========================================================="
          cloudflared tunnel --url http://localhost:8080 &> cloudflare.log &

          sleep 12

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno por un límite seguro de casi 6 horas
          sleep 21000
