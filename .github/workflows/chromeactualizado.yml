name: Chrome Ultra Rapido con Audio Real y VPN

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Entorno Ligero con Audio y VPN
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO ALPINE ULTRA LIGERO..."
          echo "=========================================================="
          
          # Usamos una imagen optimizada basada en Alpine/Debian ligero con noVNC y Audio por WebSockets
          # El ID de Urban VPN ya queda listo para forzar su instalación
          docker run -d \
            -p 8080:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e ENABLE_AUDIO=true \
            -e START_PULSEAUDIO=true \
            -e CHROMIUM_FLAGS="--no-sandbox --disable-gpu --load-extension=/usr/share/urban-vpn" \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "CONFIGURANDO EXTENSIÓN URBAN VPN..."
          echo "=========================================================="
          sleep 5
          docker exec -u 0 desktop bash -c "
            mkdir -p /etc/chromium/policies/managed && \
            echo '{ \"ExtensionInstallForcelist\": [ \"pbiocdedecmfgjhjigcoijhmneicffof;https://clients2.google.com/service/update2/crx\" ] }' > /etc/chromium/policies/managed/vpn.json
          "

          echo "=========================================================="
          echo "INSTALANDO CLOUDFLARE EN EL RUNNER..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "INICIANDO TÚNEL EN HTTP PLANO (EVITA RESTRICCIONES DE AUDIO)..."
          echo "=========================================================="
          # Al usar http:// en el puerto 8080, el audio web no sufre bloqueos por certificados temporales
          cloudflared tunnel --url http://localhost:8080 > cloudflare.log 2>&1 &

          sleep 10

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno
          sleep 21000
