name: Nuevo Chrome con Audio y KasmVNC

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual con Chrome Moderno y Audio
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO UBUNTU VISUAL CON KASMVNC..."
          echo "=========================================================="
          
          # Añadimos las variables de entorno nativas de Kasm para forzar el puente de audio (KASM_AUDIO=1)
          # Mantenemos las capacidades normales sin requerir hardware físico real.
          docker run -d \
            -p 8443:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=1 \
            -e START_PULSEAUDIO=1 \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "ESPERANDO QUE EL SISTEMA INICIE..."
          echo "=========================================================="
          sleep 15

          echo "=========================================================="
          echo "ACTIVANDO TÚNEL AUTOMÁTICO DE CLOUDFLARE..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          # Apuntamos al puerto 8443. Usamos --no-tls-verify porque Kasm usa HTTPS auto-firmado.
          cloudflared tunnel --url https://localhost:8443 --no-tls-verify &

          echo "=========================================================="
          echo "BUSCA TU ENLACE DE TRYCLOUDFLARE ABAJO:"
          echo "=========================================================="
          sleep 10
          
          # Mantenemos vivo el entorno por un límite seguro de casi 6 horas (5.8 horas)
          sleep 21000
