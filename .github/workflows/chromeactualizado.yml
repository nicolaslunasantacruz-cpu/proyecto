name: Nuevo Chrome con Audio Definitivo (Kasm Core)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Entorno Kasm Core con Audio Habilitado
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO KASM CORE CON MULTIMEDIA..."
          echo "=========================================================="
          
          # Usamos la imagen Core oficial que tiene mejor compatibilidad de módulos web
          docker run -d \
            -p 8443:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=1 \
            -e START_PULSEAUDIO=1 \
            -e KASM_AUDIO_PORTS=8443 \
            kasmweb/core-ubuntu-jammy:1.15.0

          echo "=========================================================="
          echo "CONFIGURANDO SERVICIO DE AUDIO E INSTALANDO CHROME..."
          echo "=========================================================="
          sleep 12
          
          # Forzamos al contenedor a inicializar el demonio de audio nativo de Kasm
          # Luego instalamos Google Chrome de forma limpia
          docker exec -u 0 desktop bash -c "
            apt-get update && \
            apt-get install -y pulseaudio pavucontrol && \
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && \
            dpkg -i google-chrome-stable_current_amd64.deb || apt-get install -y -f
          "

          echo "=========================================================="
          echo "INSTALANDO CLOUDFLARE EN EL RUNNER..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "INICIANDO TÚNEL Y ESPERANDO ENLACE VALIDO..."
          echo "=========================================================="
          cloudflared tunnel --url https://localhost:8443 --no-tls-verify > cloudflare.log 2>&1 &

          sleep 12

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno por un límite seguro de casi 6 horas (5.8 horas)
          sleep 21000
