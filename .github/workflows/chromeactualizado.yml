name: Chrome Moderno con Audio Real Funcionando

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual con Chrome Moderno y Audio
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO CON AUDIO POR SOFTWARE..."
          echo "=========================================================="
          
          # Levantamos una imagen con entorno de escritorio completo y Chrome moderno
          # Configuramos el entorno para inicializar PulseAudio interno
          docker run -d \
            -p 8080:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e START_PULSEAUDIO=1 \
            -e ENABLE_AUDIO=true \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "ESPERANDO QUE EL SISTEMA INICIE..."
          echo "=========================================================="
          sleep 15

          echo "=========================================================="
          echo "INSTALANDO CLOUDFLARE EN EL RUNNER..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "INICIANDO TÚNEL Y ESPERANDO ENLACE VALIDO..."
          echo "=========================================================="
          # Apuntamos al puerto seguro 8080 del contenedor
          cloudflared tunnel --url https://localhost:8080 --no-tls-verify > cloudflare.log 2>&1 &

          sleep 12

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno por un límite seguro de casi 6 horas (5.8 horas)
          sleep 21000
