name: Nuevo Chrome con Audio y KasmVNC

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual con Chrome Moderno y Audio
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO UBUNTU VISUAL CON KASMVNC..."
          echo "=========================================================="
          
          docker run -d \
            -p 8443:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=1 \
            -e START_PULSEAUDIO=1 \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "INSTALANDO CLOUDFLARE..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "INICIANDO TÚNEL Y ESPERANDO ENLACE VALIDO..."
          echo "=========================================================="
          # Guardamos la salida del túnel en un archivo de texto para poder leer el enlace
          cloudflared tunnel --url https://localhost:8443 --no-tls-verify > cloudflare.log 2>&1 &

          # Esperamos hasta 30 segundos a que Cloudflare genere y registre el dominio correctamente
          for i in {1..15}; do
            if grep -q "trycloudflare.com" cloudflare.log; then
              echo "¡Túnel creado con éxito!"
              break
            fi
            sleep 2
          done

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          # Extrae la URL exacta del archivo de registro para que solo tengas que hacer clic
          grep -o 'https://[^ ]*trycloudflare.com' cloudflare.log | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno por un límite seguro de casi 6 horas (5.8 horas)
          sleep 21000
