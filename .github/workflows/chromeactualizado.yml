name: Chrome Estable con Audio Real y VPN

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Entorno y Asegurar Conexión sin Error 502
        run: |
          echo "=========================================================="
          echo "1. LEVANTANDO CONTENEDOR DOCKER..."
          echo "=========================================================="
          docker run -d \
            -p 8443:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=1 \
            -e START_PULSEAUDIO=1 \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "2. INSTALANDO CLOUDFLARE EN EL RUNNER..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "3. INICIANDO TÚNEL INMEDIATAMENTE..."
          echo "=========================================================="
          cloudflared tunnel --url https://localhost:8443 --no-tls-verify > cloudflare.log 2>&1 &

          echo "=========================================================="
          echo "4. ESPERANDO 30 SEGUNDOS PARA QUE EL SISTEMA ENCIENDA..."
          echo "=========================================================="
          # Este tiempo es crítico para que Kasm levante su servidor web interno antes de configurar el resto
          sleep 30

          echo "=========================================================="
          echo "5. CONFIGURANDO EXTENSIÓN URBAN VPN Y PARCHES DE AUDIO..."
          echo "=========================================================="
          # Forzamos la instalación limpia de Urban VPN
          docker exec -u 0 desktop bash -c "
            mkdir -p /etc/chromium/policies/managed && \
            echo '{ \"ExtensionInstallForcelist\": [ \"pbiocdedecmfgjhjigcoijhmneicffof;https://clients2.google.com/service/update2/crx\" ] }' > /etc/chromium/policies/managed/vpn.json
          "
          
          # Desmuteamos y subimos el volumen digital al 100%
          docker exec -u 0 desktop bash -c "
            pactl set-sink-mute @DEFAULT_SINK@ false 2>/dev/null || true && \
            pactl set-sink-volume @DEFAULT_SINK@ 100% 2>/dev/null || true && \
            amixer set Master unmute 100% 2>/dev/null || true
          "

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno
          sleep 21000
