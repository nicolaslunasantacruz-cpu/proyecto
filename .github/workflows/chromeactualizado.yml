name: Chrome Moderno con Audio Real y Urban VPN

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual con Chrome, Audio y VPN
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO CON AUDIO POR SOFTWARE..."
          echo "=========================================================="
          
          # Mantenemos los puertos e infraestructura estables de Kasm
          # Eliminamos conflictos de proxies internos para asegurar el arranque directo
          docker run -d \
            -p 8443:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=1 \
            -e START_PULSEAUDIO=1 \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "CONFIGURANDO EXTENSIÓN URBAN VPN EN CHROME..."
          echo "=========================================================="
          # Le damos un momento al contenedor para crear sus carpetas internas
          sleep 10
          
          # Forzamos la instalación limpia de Urban VPN usando las políticas maestras de Chromium
          docker exec -u 0 desktop bash -c "
            mkdir -p /etc/chromium/policies/managed && \
            echo '{ \"ExtensionInstallForcelist\": [ \"pbiocdedecmfgjhjigcoijhmneicffof;https://clients2.google.com/service/update2/crx\" ] }' > /etc/chromium/policies/managed/vpn.json
          "

          echo "=========================================================="
          echo "INSTALANDO CLOUDFLARE EN EL RUNNER..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "INICIANDO TÚNEL HTTP SEGURO Y ESPERANDO ARRANQUE..."
          echo "=========================================================="
          # Volvemos a apuntar de forma segura al puerto HTTPS nativo (8443) con verificación omitida
          cloudflared tunnel --url https://localhost:8443 --no-tls-verify > cloudflare.log 2>&1 &

          # Damos un colchón de tiempo generoso (20 segundos) para que el servidor web de Kasm 
          # termine de iniciar antes de que intentes abrir el enlace. Esto evita el Error 502.
          sleep 20

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno por un límite seguro de casi 6 horas
          sleep 21000
