name: Navegador Ultra Rapido Sin Audio - Maxima Optimizacion

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Chrome Kasm al Máximo Rendimiento
        run: |
          echo "=========================================================="
          echo "LEVANTANDO NAVEGADOR EN MODO ULTRA RÁPIDO..."
          echo "=========================================================="
          
          # Arrancamos Kasm desactivando por completo el audio y PulseAudio
          # Esto libera casi todo el procesador para que vaya súper fluido
          docker run -d \
            -p 8443:6901 \
            --shm-size=4gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=0 \
            -e START_PULSEAUDIO=0 \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "INSTALANDO EXTENSIÓN URBAN VPN..."
          echo "=========================================================="
          sleep 8
          
          # Forzamos la instalación limpia de Urban VPN por políticas de Chrome
          docker exec -u 0 desktop bash -c "
            mkdir -p /etc/chromium/policies/managed && \
            echo '{ \"ExtensionInstallForcelist\": [ \"pbiocdedecmfgjhjigcoijhmneicffof;https://clients2.google.com/service/update2/crx\" ] }' > /etc/chromium/policies/managed/vpn.json
          "

          echo "=========================================================="
          echo "CONECTANDO TÚNEL DE ACCESO..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          # Iniciamos el túnel directo al puerto nativo seguro
          cloudflared tunnel --url https://localhost:8443 --no-tls-verify > cloudflare.log 2>&1 &

          # Un respiro de 12 segundos para que el túnel se enlace bien
          sleep 12

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno
          sleep 21000
