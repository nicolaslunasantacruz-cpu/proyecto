name: Nuevo Chrome con Audio y KasmVNC

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Levantar Escritorio Virtual con Chrome Moderno y Audio
        run: |
          echo "=========================================================="
          echo "LEVANTANDO ENTORNO UBUNTU VISUAL CON KASMVNC..."
          echo "=========================================================="
          
          docker run -d \
            -p 8443:6901 \
            --shm-size=2gb \
            --name=desktop \
            -e VNC_PW=password \
            -e KASM_AUDIO=1 \
            -e START_PULSEAUDIO=1 \
            kasmweb/chrome:1.15.0

          echo "=========================================================="
          echo "INSTALANDO CLOUDFLARE..."
          echo "=========================================================="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          echo "=========================================================="
          echo "INICIANDO TÚNEL Y ESPERANDO ENLACE VALIDO..."
          echo "=========================================================="
          # Guardamos la salida del túnel en un archivo de texto
          cloudflared tunnel --url https://localhost:8443 --no-tls-verify > cloudflare.log 2>&1 &

          # Esperamos de forma segura a que Cloudflare conecte y escriba en el archivo
          sleep 8

          echo "=========================================================="
          echo "TU ENLACE DE ACCESO ES:"
          echo "=========================================================="
          # Filtramos de forma más precisa buscando la palabra trycloudflare.com
          cat cloudflare.log | grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" | head -n 1
          echo "=========================================================="
          
          # Mantenemos vivo el entorno por un límite seguro de casi 6 horas (5.8 horas)
          sleep 21000
